name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test, typecheck, Expo Doctor, and web export
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: routelo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: routelo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run validation
        run: npm run validate
