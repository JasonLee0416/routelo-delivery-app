name: iOS

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulator-build:
    name: Expo prebuild and iOS Simulator
    runs-on: macos-15
    defaults:
      run:
        working-directory: routelo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: routelo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify shared PP-OCR models
        run: npm run verify:ocr-models

      - name: Export iOS application assets
        run: npx expo export --platform ios --output-dir dist-ios

      - name: Verify PP-OCR models are bundled
        run: |
          test "$(find dist-ios -name '*.onnx' | wc -l | tr -d ' ')" -ge 2
          find dist-ios -name '*.onnx' -print

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: pod install --project-directory=ios

      - name: Build iOS Simulator app
        run: |
          xcodebuild \
            -workspace ios/routelo.xcworkspace \
            -scheme routelo \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build
