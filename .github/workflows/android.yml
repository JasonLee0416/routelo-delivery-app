name: Android

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-build:
    name: Expo prebuild and Android debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: routelo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: routelo/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Verify shared PP-OCR models
        run: npm run verify:ocr-models

      - name: Export Android application assets
        run: npx expo export --platform android --output-dir dist-android

      - name: Verify PP-OCR models are bundled
        run: |
          test "$(find dist-android -name '*.onnx' | wc -l | tr -d ' ')" -ge 2
          find dist-android -name '*.onnx' -print

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build debug APK
        run: ./android/gradlew -p android :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: routelo-debug-${{ github.sha }}
          path: routelo/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
